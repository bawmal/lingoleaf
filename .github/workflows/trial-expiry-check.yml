name: Daily Trial Expiry Check

on:
  schedule:
    - cron: '0 9 * * *'  # Daily at 9am UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  check-trials:
    runs-on: ubuntu-latest
    steps:
      - name: Check expired trials
        run: |
          echo "🚀 Starting trial expiry check at $(date)"
          
          # Call Netlify function with proper error handling
          response=$(curl -s -w "\n%{http_code}" \
            --max-time 300 \
            -X GET \
            https://lingoleaf.ai/.netlify/functions/check-trial-expiry)
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          
          echo "📊 HTTP Status: $http_code"
          echo "📝 Response: $body"
          
          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "✅ Trial expiry check completed successfully at $(date)"
            exit 0
          else
            echo "❌ Trial expiry check failed with status $http_code"
            exit 1
          fi
